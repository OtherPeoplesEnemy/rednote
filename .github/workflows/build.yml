name: Build RedNote

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build RedNote
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: v__VERSION__
          releaseName: 'RedNote v__VERSION__'
          releaseBody: |
            ## RedNote v__VERSION__

            Offline pentest note-taking app that syncs to RedTrack.

            ### Downloads
            - **Windows**: `RedNote_x.x.x_x64.msi` or `RedNote_x.x.x_x64-setup.exe`
            - **Linux/Kali**: `red-note_x.x.x_amd64.deb` or `.AppImage`
            - **macOS Intel**: `RedNote_x.x.x_x64.dmg`
            - **macOS Apple Silicon**: `RedNote_x.x.x_aarch64.dmg`

            ### Install
            - **Windows**: Run the `.msi` installer
            - **Linux/Kali**: `sudo dpkg -i red-note_*.deb`
            - **macOS**: Open `.dmg` and drag to Applications

            ### First Run
            1. Go to Settings
            2. Enter your RedTrack server URL
            3. Enter your API key (RedTrack → Settings → API Key)
            4. Click Test Connection
          releaseDraft: false
          prerelease: false
